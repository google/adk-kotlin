android.useAndroidX=true
org.gradle.jvmargs=-Xmx32g -XX:MaxMetaspaceSize=2g
# Compile Kotlin in-process so a single heap (org.gradle.jvmargs) covers the
# whole gradle build, avoiding a second compiler daemon whose heap could
# exhaust available memory.
kotlin.compiler.execution.strategy=in-process
org.gradle.vfs.watch=false
org.gradle.parallel=true
# required because we introduced custom intermediate source sets (commonJvmAndroidMain and commonJvmAndroidTest) a
kotlin.mpp.applyDefaultHierarchyTemplate=false
